[[redirects]]
from = "https://vease.geode-solutions.netlify.com/*"
to = "https://vease.geode-solutions.com/:splat"
status = 301
force = true

[build]
base = "."
publish = "dist"
ignore = "exit 0"

[context.production]
command = "cd .. && sed -i 's/\"0\\.0\\.0\"/\"latest\"/g' package.json && cat package.json && npm i && npm list && npm run build"

[context.branch-deploy]
command = "sed -i 's/\"0\\.0\\.0\"/\"next\"/g' package.json && cat package.json && npm i && npm list && npm run build"
